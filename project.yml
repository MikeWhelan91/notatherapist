name: NotATherapist
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  NotATherapist:
    type: application
    platform: iOS
    sources:
      - NotATherapist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.notatherapist
        PRODUCT_NAME: Not a Therapist
        CODE_SIGN_ENTITLEMENTS: NotATherapist/NotATherapist.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Not a Therapist
        INFOPLIST_KEY_NSHealthShareUsageDescription: Optional Apple Health access helps spot simple patterns between sleep, steps, mood, and journal entries.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      gatherCoverageData: false
