name: NotATherapist
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  NotATherapist:
    type: application
    platform: iOS
    sources:
      - NotATherapist
      - Shared
    dependencies:
      - package: Lottie
      - package: Charts
        product: DGCharts
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAnalytics
      - package: ArgmaxOSS
        product: WhisperKit
      - target: AnchorWidgets
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikewhelan.anchor
        PRODUCT_NAME: Anchor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: NotATherapist/NotATherapist.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Anchor
        INFOPLIST_KEY_FirebaseAppDelegateProxyEnabled: NO
        INFOPLIST_KEY_FirebaseAutomaticScreenReportingEnabled: NO
        INFOPLIST_KEY_NSHealthShareUsageDescription: Optional Apple Health access helps spot simple patterns between sleep, steps, mood, and journal entries.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Voice journaling uses the microphone only while you record an entry.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        OTHER_LDFLAGS: "$(inherited) -ObjC"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    scheme:
      gatherCoverageData: false
  AnchorWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - AnchorWidgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mikewhelan.anchor.widgets
        PRODUCT_NAME: AnchorWidgets
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: AnchorWidgets/AnchorWidgets.entitlements
        INFOPLIST_FILE: AnchorWidgets/Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        TARGETED_DEVICE_FAMILY: "1"
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
packages:
  Charts:
    url: https://github.com/ChartsOrg/Charts
    from: 5.1.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.15.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: 4.5.0
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    from: 0.9.0
